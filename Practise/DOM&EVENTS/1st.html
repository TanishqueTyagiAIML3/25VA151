<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simple</title>
    <style>
        div{
            border:2px aqua solid;
            border-radius:10%;
            box-sizing: border-box;
            width:400px;
            padding:20px 20px;
            height: 300px;
            color:white;
            background-color: bisque;
            box-shadow: 1px 1px black inset;
        }
    </style>
</head>
<body>
    <div>
        <h2>Hello Java Script</h2>
    </div>
    <script >
        let str=document.querySelector("h2");
        str.innerText=(str.innerText).concat("From Apna college");
    </script>
</body>
</html>
