<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        main{
            grid-template-columns: auto  auto auto;
            display: grid;
        }
        .box{
            color:red;
            font-size: medium;
            font-style: italic;
            background-color: aqua;
           padding:20px 20px;
        }
    </style>
</head>
<body>
    <main>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </main>
    <script>
        let arr=["Sachin","Sarthak","Tanishque"];
        let box=document.querySelectorAll(".box");
        let idx=0;
        box.forEach((val) => {
            val.innerHTML=`Hello ${arr[idx]} What's Up`;
       idx++;
        });
    </script>
</body>
</html>
