<!DOCTYPE html>
<html>
    <head>
        <title>Flex Layout</title>
         <style>
            body{
                background-color: black;
            }
        main{
            width:500px;
            height:800px;
            background-color: bisque;
            border:2px solid black;
            border-radius:2px;
            margin:auto;
            box-shadow: 2px 2px 10px red;
            display:flex;
            flex-direction:row;
            justify-content: space-between;
            flex-wrap: wrap;
            outline:2px solid red;
            outline-offset: 10px;
        }
        .heading{
            background-color: grey;
            margin:5px 5px;
            flex-basis: 500px;
            height:100px;
        }
        .box{
             margin:0px 5px;
             background-color: grey;
             flex-basis:100px;
             flex-grow:1;
             height:100px;
        }
        .mod{
            background-color:grey;
            margin:0px 5px;
            flex-basis: 150px;
            flex-grow:1;
            height:150px;
        }
    </style>
    </head>
    <body>
        <main>
            <div class="heading"></div>
           <div class="box"></div>
           <div class="box"></div>
           <div class="box"></div>
           <div class="box"></div>
           <div class="box"></div>
           <div class="box"></div>
           <div class="box"></div>
           <div class="box"></div>
           <div class="box"></div>
           <div class="box"></div>
           <div class="box"></div>
           <div class="box"></div>
           <div class="box"></div>
           <div class="box"></div>
           <div class="box"></div>
           <div class="box"></div>
           <div class="mod"></div>
           <div class="mod"></div>
           <div class="mod"></div>
           <div class="heading" style="height:50px"></div>
        </main>
    </body>
</html>
