<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            align-items: center;
            text-align: center;
            background-color: black;
            color:aquamarine;
            padding-top:300px;
            font-style: italic;
        }
        button:hover{
            border-radius:10%;
        }
    </style>
</head>
<body>
    <button onclick="result()" id="show"><p>Output</p></button>
    <script>
        let name=prompt("Enter Your Name");
        function result(){
            document.getElementById("show").innerHTML=`<p>${name}</p>`;
        }


    </script>
</body>
</html>
